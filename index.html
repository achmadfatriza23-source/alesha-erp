<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALESHA ERP</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#f3f4f6;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            background:#fff;
            width:90%;
            max-width:420px;
            padding:30px;
            border-radius:20px;
            box-shadow:0 10px 25px rgba(0,0,0,.1);
            text-align:center;
        }

        h1{
            color:#1E40AF;
            margin-bottom:10px;
        }

        p{
            color:#666;
            margin-bottom:25px;
        }

        .btn{
            display:block;
            background:#2563EB;
            color:white;
            text-decoration:none;
            padding:15px;
            border-radius:12px;
            font-weight:bold;
        }

        .btn:hover{
            background:#1D4ED8;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>CV. ALESHA ERP</h1>
    <p>Sistem Manajemen Proyek</p>

    <a href="#" class="btn">
        Masuk Dashboard
    </a>
</div>

</body>
</html>
